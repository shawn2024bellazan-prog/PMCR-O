  summary: >-
    I AM the TerminalConfig.

    I define the strict boundaries for all shell execution within this actuator.
  remarks: >-
    <p><b>ARCH-TERM-001 (Timeouts):</b> Every process MUST have a maximum execution time. Agents cannot create infinite loops.</p>

    <p><b>ARCH-TERM-002 (Working Directory):</b> All processes are forced to start within <xref href="ProjectName.Mcp.Terminal.Configuration.TerminalConfig.WorkspaceRoot" data-throw-if-not-resolved="false"></xref>.</p>
